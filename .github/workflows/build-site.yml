name: Build and deploy catalog site

on:
  push:
    branches:
      - main
    paths:
      - "packages/**.yaml"
      - "schema.json"
      - "site/**"
      - ".github/workflows/build-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Enrich manifests and build site
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install Python deps
        run: pip install PyYAML requests

      - name: Enrich manifests with live data from PyPI and GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/enrich.py \
            --packages-dir packages \
            --output site/src/_data/packages.json

      - name: Install Node deps
        working-directory: site
        run: npm ci

      - name: Build site
        working-directory: site
        env:
          ELEVENTY_PATH_PREFIX: /arches-catalog/
        run: npm run build

      - name: Build Pagefind search index
        working-directory: site
        run: npx pagefind --site _site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/_site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
